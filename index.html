<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0f19">
    <title>JMF BOT | الاتصال السحابي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19; --panel: #151a28; --primary: #00d4ff; --secondary: #0088ff;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(0, 212, 255, 0.2);
            --danger: #ef4444; --success: #10b981;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        .container {
            background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
            padding: 30px 20px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(0, 212, 255, 0.1);
            transition: 0.3s;
        }
        .logo-box {
            width: 80px; height: 80px; background: rgba(0, 212, 255, 0.1); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;
            border: 1px solid var(--border); box-shadow: inset 0 0 15px rgba(0, 212, 255, 0.2);
        }
        .logo-box svg { width: 40px; height: 40px; color: var(--primary); }
        h1 { font-size: 22px; margin: 0 0 10px 0; color: #fff; font-weight: 800; }
        p { font-size: 13px; color: var(--text-muted); margin: 0 0 25px 0; line-height: 1.6; }
        
        #input-view, #waiting-view { display: none; }

        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; font-size: 12px; font-weight: bold; color: var(--primary); margin-bottom: 8px; }
        input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #334155; color: #fff;
            padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; text-align: center; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        
        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 800; color: #000;
            cursor: pointer; transition: 0.3s; background: linear-gradient(to right, var(--primary), var(--secondary));
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Waiting Animation */
        .pulse-loader {
            width: 60px; height: 60px; background: var(--primary); border-radius: 50%;
            margin: 20px auto; position: relative; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 212, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }

        .retry-text { font-size: 12px; color: var(--primary); margin-top: 15px; font-weight: bold; }
        .change-link { color: var(--text-muted); font-size: 12px; text-decoration: none; display: inline-block; margin-top: 20px; border-bottom: 1px dashed var(--text-muted); }
        
        .footer { margin-top: 30px; font-size: 11px; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
        </div>

        <!-- View 1: Login Input -->
        <div id="input-view">
            <h1>أهلاً بك في JMF</h1>
            <p>يرجى إدخال معرف الجهاز (Device ID) للاتصال بالروبوت الخاص بك.</p>
            <div class="input-group">
                <input type="text" id="acc-input" placeholder="a1b2c3d4">
            </div>
            <button id="connect-btn" class="btn" onclick="saveAndConnect()">الاتصال بلوحة التحكم</button>
        </div>

        <!-- View 2: Waiting View -->
        <div id="waiting-view">
            <h1>بانتظار تشغيل البوت..</h1>
            <p>يرجى تشغيل تطبيق JMF BOT على حاسوبك للاتصال بلوحة التحكم السحابية.</p>
            <div class="pulse-loader"></div>
            <div class="retry-text">جاري فحص الاتصال تلقائياً...</div>
            <a href="#" class="change-link" onclick="logout()">تغيير معرف الجهاز</a>
        </div>
    </div>
    
    <div class="footer">JMF Cloud Connect &copy; 2026</div>

    <script>
        const FB_URL = "https://jmf-bot-default-rtdb.firebaseio.com/devices";
        let retryInterval = null;

        async function checkConnection(devId) {
            try {
                const response = await fetch(`${FB_URL}/${devId}.json`, { cache: "no-store" });
                const data = await response.json();
                
                if(data && data.url) {
                    try {
                        // Pre-flight check: Try to ping the bot URL
                        const ping = await fetch(data.url, { mode: 'no-cors', timeout: 3000 });
                        
                        // INSTEAD OF REDIRECTING: Load in a Full-Screen Iframe
                        // This keeps the Vercel URL in the browser bar for PWA installation
                        document.body.innerHTML = `
                            <iframe src="${data.url}" 
                                    style="position:fixed; top:0; left:0; bottom:0; right:0; width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden; z-index:999999;">
                            </iframe>`;
                        if(retryInterval) clearInterval(retryInterval);
                        return true;
                    } catch (e) {
                        console.log("Bot URL found but unreachable (Bot might be offline).");
                    }
                }
            } catch (e) { console.error("Firebase Error:", e); }
            return false;
        }

        function saveAndConnect() {
            const devId = document.getElementById('acc-input').value.trim();
            if(!devId) return alert("يرجى إدخال المعرف");
            localStorage.setItem('jmf_dev_id', devId);
            startWaiting(devId);
        }

        async function startWaiting(devId) {
            document.getElementById('input-view').style.display = 'none';
            document.getElementById('waiting-view').style.display = 'block';
            
            // Initial check
            const connected = await checkConnection(devId);
            
            if(!connected) {
                // Keep checking every 5 seconds
                if(retryInterval) clearInterval(retryInterval);
                retryInterval = setInterval(async () => {
                    await checkConnection(devId);
                }, 5000);
            }
        }

        function logout() {
            localStorage.removeItem('jmf_dev_id');
            if(retryInterval) clearInterval(retryInterval);
            location.reload();
        }

        window.onload = () => {
            const savedId = localStorage.getItem('jmf_dev_id');
            const urlParams = new URLSearchParams(window.location.search);
            const urlDevId = urlParams.get('dev');

            if (urlDevId) {
                localStorage.setItem('jmf_dev_id', urlDevId);
                startWaiting(urlDevId);
            } else if (savedId) {
                startWaiting(savedId);
            } else {
                document.getElementById('input-view').style.display = 'block';
            }
        };

        document.getElementById('acc-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") saveAndConnect();
        });
    </script>
</body>
</html>
