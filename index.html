<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b0f19">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>JMF BOT | الاتصال السحابي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg: #0b0f19; --panel: #151a28; --primary: #00d4ff; --secondary: #0088ff;
            --text-main: #f8fafc; --text-muted: #94a3b8; --border: rgba(0, 212, 255, 0.2);
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }
        .container {
            background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
            padding: 30px 20px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo-box {
            width: 80px; height: 80px; background: rgba(0, 212, 255, 0.1); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;
            border: 1px solid var(--border);
        }
        .logo-box svg { width: 40px; height: 40px; color: var(--primary); }
        h1 { font-size: 22px; margin: 0 0 10px 0; color: #fff; }
        p { font-size: 13px; color: var(--text-muted); margin: 0 0 25px 0; }
        #input-view, #waiting-view { display: none; }
        input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #334155; color: #fff;
            padding: 15px; border-radius: 12px; font-size: 16px; text-align: center; outline: none; margin-bottom: 20px;
        }
        .btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 800; color: #000;
            cursor: pointer; background: linear-gradient(to right, var(--primary), var(--secondary));
        }
        .pulse-loader {
            width: 60px; height: 60px; background: var(--primary); border-radius: 50%;
            margin: 20px auto; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 212, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }
        .footer { margin-top: 30px; font-size: 11px; color: #64748b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
        </div>
        <div id="input-view">
            <h1>أهلاً بك في JMF</h1>
            <p>يرجى إدخال معرف الجهاز (Device ID) للاتصال.</p>
            <input type="text" id="acc-input" placeholder="a1b2c3d4">
            <button class="btn" onclick="saveAndConnect()">الاتصال بلوحة التحكم</button>
        </div>
        <div id="waiting-view">
            <h1>بانتظار تشغيل البوت..</h1>
            <div class="pulse-loader"></div>
            <p>يرجى تشغيل تطبيق JMF BOT على حاسوبك.</p>
            <a href="#" style="color:var(--primary); font-size:12px;" onclick="logout()">تغيير معرف الجهاز</a>
            <button id="pwa-install-btn" class="btn" style="display:none; margin-top:20px; background: #1e293b; color: #fff; border: 1px solid var(--primary);">تثبيت التطبيق</button>
        </div>
    </div>
    <div class="footer">JMF Cloud Connect &copy; 2026</div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('pwa-install-btn');
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'block';
        });
        installBtn.onclick = async () => {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; installBtn.style.display = 'none'; }
        };

        const FB_URL = "https://jmf-bot-default-rtdb.firebaseio.com/devices";
        let retryInterval = null;

        async function checkConnection(devId) {
            try {
                const response = await fetch(`${FB_URL}/${devId}.json`, { cache: "no-store" });
                const data = await response.json();
                if(data && data.url) {
                    try {
                        await fetch(data.url, { mode: 'no-cors' });
                        document.body.innerHTML = `<iframe src="${data.url}" style="position:fixed; top:0; left:0; bottom:0; right:0; width:100%; height:100%; border:none; z-index:999999;"></iframe>`;
                        if(retryInterval) clearInterval(retryInterval);
                        return true;
                    } catch (e) {}
                }
            } catch (e) {}
            return false;
        }

        function saveAndConnect() {
            const devId = document.getElementById('acc-input').value.trim();
            if(!devId) return;
            localStorage.setItem('jmf_dev_id', devId);
            startWaiting(devId);
        }

        function startWaiting(devId) {
            document.getElementById('input-view').style.display = 'none';
            document.getElementById('waiting-view').style.display = 'block';
            checkConnection(devId);
            retryInterval = setInterval(() => checkConnection(devId), 5000);
        }

        function logout() { localStorage.removeItem('jmf_dev_id'); location.reload(); }

        window.onload = () => {
            const savedId = localStorage.getItem('jmf_dev_id');
            if (savedId) startWaiting(savedId);
            else document.getElementById('input-view').style.display = 'block';
        };
    </script>
</body>
</html>
